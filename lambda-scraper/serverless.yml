# org: minhdo714
service: pcb-scraper

provider:
  name: aws
  region: us-east-1      # Change to region closest to your scrape targets (us-west-2 for CA/AZ)
  architecture: x86_64
  memorySize: 2048       # Chromium needs at least 1.5GB; 2GB gives headroom
  timeout: 300           # 5-minute max per run
  profile: pcb-scraper

environment:
  PROXY_URL: ${env:PROXY_URL}           # DataImpulse: http://user:pass@gw.dataimpulse.com:823
  SUPABASE_URL: ${env:SUPABASE_URL}
  SUPABASE_KEY: ${env:SUPABASE_SERVICE_KEY}  # Use service role key (bypasses RLS for upserts)

ecr:
  images:
    scraper-image-v8:
      path: .

# plugins:
#   - serverless-lift

functions:
  scrape:
    image:
      name: scraper-image-v8
    events:
      - http:
          path: scrape
          method: post
